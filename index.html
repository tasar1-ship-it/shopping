function classify(text){
  var lower=text.toLowerCase();
  for(var i=0;i<KR.length;i++){
    var kws=KR[i][1];
    for(var j=0;j<kws.length;j++){
      var kw=kws[j];
      var escaped=kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      try{if(new RegExp('\\b'+escaped+'\\b','i').test(lower))return KR[i][0];}
      catch(e){if(lower.indexOf(kw)>=0)return KR[i][0];}
    }
  }
  return"Other";
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function grp(items){
  var g={};
  for(var i=0;i<items.length;i++){
    var c=items[i].category;
    if(!g[c])g[c]=[];
    g[c].push(items[i]);
  }
  var keys=Object.keys(g).sort(function(a,b){return a==='Other'?1:b==='Other'?-1:a.localeCompare(b)});
  var result=[];
  for(var i=0;i<keys.length;i++)result.push({c:keys[i],items:g[keys[i]]});
  return result;
}

var micsvg='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>';
var rstsvg='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>';

function R(){
  var t=T[lang];
  var ct=CAT[lang];
  var act=[];var dn=[];
  for(var i=0;i<shop.length;i++){if(shop[i].done)dn.push(shop[i]);else act.push(shop[i]);}
  var selCt=0;for(var i=0;i<tmpl.length;i++){if(tmpl[i].selected)selCt++;}

  var h='<div class="hd"><div class="ht"><div><div class="ti">'+t.title+'</div><div class="su">'+t.sub+'</div></div><button class="lb" onclick="tgLang()">'+((lang==='en')?'\uD55C\uAD6D\uC5B4':'English')+'</button></div><div class="ts">';
  var tabs=[['template',t.tmpl,tmpl.length],['shopping',t.shop,act.length],['completed',t.comp,dn.length]];
  for(var i=0;i<tabs.length;i++){
    var k=tabs[i][0],l=tabs[i][1],n=tabs[i][2];
    var cls=k===tab?' a':'';
    var bc=k==='completed'?'bm':'bg';
    h+='<button class="tb'+cls+'" onclick="sTab(\''+k+'\')">'+l+(n>0?' <span class="'+bc+'">'+n+'</span>':'')+'</button>';
  }
  h+='</div></div>';

  if(tab==='template'||tab==='shopping'){
    var fn=tab==='template'?'addT':'addS';
    h+='<div class="ia"><div class="ir"><input type="text" id="mi" placeholder="'+t.ph+'" oninput="inp=this.value" onkeydown="if(event.key===\'Enter\')'+fn+'()">';
    h+='<button class="ib" onclick="pPh()">'+camsvg+'</button>';
    h+='<button class="ib'+(listening?' ma':'')+'" onclick="tgV()">'+micsvg+'</button>';
    h+='<button class="ab" onclick="'+fn+'()">'+t.add+'</button></div>';
    if(vmsg)h+='<div class="vt">'+(listening?'<span class="vd"></span>':'')+vmsg+'</div>';
    if(photo)h+='<div class="pp"><img src="'+photo+'"><button onclick="photo=null;R()">&#10005;</button></div>';
    h+='</div>';
  }

  h+='<div class="la">';

  if(tab==='template'){
    if(tmpl.length>0){
      h+='<div class="ta"><button class="sb" onclick="selA()">'+t.selA+'</button><button class="sb" onclick="deA()">'+t.deA+'</button><button class="stb" onclick="goShop()">'+t.start+' ('+selCt+')</button></div>';
    }else{
      h+='<div class="em"><div>'+t.emptyT+'</div><div class="ems">'+t.emptyTS+'</div></div>';
    }
    var gs=grp(tmpl);
    for(var gi=0;gi<gs.length;gi++){
      var g=gs[gi];
      h+='<div class="cg"><div class="ch"><span class="cd"></span><span class="cn">'+(ct[g.c]||g.c)+'</span><span class="cc">'+g.items.length+'</span></div>';
      for(var ii=0;ii<g.items.length;ii++){
        var it=g.items[ii];
        h+='<div class="it" style="animation-delay:'+ii*30+'ms"><button class="sx'+(it.selected?' on':'')+'" onclick="tgSel('+it.id+')">'+(it.selected?chk:'')+'</button><span class="tx'+(it.selected?'':' off')+'">'+esc(it.text)+'</span>';
        if(it.photo)h+='<img class="th" src="'+it.photo+'" data-id="'+it.id+'" data-type="t">';
        h+='<div class="qc"><button class="qb" onclick="sQty('+it.id+',-1)">&minus;</button><span class="qn">'+it.qty+'</span><button class="qb" onclick="sQty('+it.id+',1)">+</button></div>';
        h+='<button class="db" onclick="delT('+it.id+')">'+xsvg+'</button></div>';
      }
      h+='</div>';
    }
  }

  if(tab==='shopping'){
    if(act.length===0)h+='<div class="em"><div>'+t.empty+'</div></div>';
    var gs=grp(act);
    for(var gi=0;gi<gs.length;gi++){
      var g=gs[gi];
      h+='<div class="cg"><div class="ch"><span class="cd"></span><span class="cn">'+(ct[g.c]||g.c)+'</span><span class="cc">'+g.items.length+'</span></div>';
      for(var ii=0;ii<g.items.length;ii++){
        var it=g.items[ii];
        var isCk=it.id===ckid;
        h+='<div class="it ck'+(isCk?' cki':'')+'" style="animation-delay:'+ii*30+'ms" onclick="chkOff('+it.id+')"><div class="ci'+(isCk?' on':'')+'">'+(isCk?chk:'')+'</div><span class="tx'+(isCk?' off':'')+'">'+esc(it.text)+'</span>';
        if(it.qty>1)h+='<span class="qg">&times;'+it.qty+'</span>';
        if(it.photo)h+='<img class="th" src="'+it.photo+'" data-id="'+it.id+'" data-type="s">';
        h+='</div>';
      }
      h+='</div>';
    }
  }

  if(tab==='completed'){
    if(dn.length>0)h+='<div class="rb"><button class="rbtn" onclick="rstAll()">'+rstsvg+t.reset+'</button></div>';
    else h+='<div class="em"><div>'+t.emptyC+'</div></div>';
    var gs=grp(dn);
    for(var gi=0;gi<gs.length;gi++){
      var g=gs[gi];
      h+='<div class="cg"><div class="ch"><span class="cd"></span><span class="cn">'+(ct[g.c]||g.c)+'</span></div>';
      for(var ii=0;ii<g.items.length;ii++){
        var it=g.items[ii];
        h+='<div class="it ck cpl" onclick="rstOne('+it.id+')"><div class="ci on">'+chk+'</div><span class="tx off">'+esc(it.text)+'</span>';
        if(it.qty>1)h+='<span class="qg" style="opacity:.5">&times;'+it.qty+'</span>';
        h+='</div>';
      }
      h+='</div>';
    }
  }

  h+='</div>';
  document.getElementById('app').innerHTML=h;
  var mi=document.getElementById('mi');
  if(mi)mi.value=inp;
}

function tgLang(){lang=lang==='en'?'ko':'en';sv();R()}
function sTab(t){tab=t;R()}

function addT(){
  var txt=inp.trim();if(!txt)return;
  tmpl.push({id:nid(),text:txt,category:classify(txt),qty:1,selected:true,photo:photo});
  inp='';photo=null;sv();R();
}
function addS(){
  var txt=inp.trim();if(!txt)return;
  shop.push({id:nid(),text:txt,category:classify(txt),qty:1,photo:photo,done:false});
  inp='';photo=null;sv();R();
}
function tgSel(id){for(var i=0;i<tmpl.length;i++){if(tmpl[i].id===id){tmpl[i].selected=!tmpl[i].selected;break;}}sv();R()}
function sQty(id,d){for(var i=0;i<tmpl.length;i++){if(tmpl[i].id===id){tmpl[i].qty=Math.max(1,tmpl[i].qty+d);break;}}sv();R()}
function delT(id){tmpl=tmpl.filter(function(x){return x.id!==id});sv();R()}
function selA(){for(var i=0;i<tmpl.length;i++)tmpl[i].selected=true;sv();R()}
function deA(){for(var i=0;i<tmpl.length;i++)tmpl[i].selected=false;sv();R()}

function goShop(){
  shop=[];
  for(var i=0;i<tmpl.length;i++){
    if(tmpl[i].selected){
      shop.push({id:nid(),text:tmpl[i].text,category:tmpl[i].category,qty:tmpl[i].qty,photo:tmpl[i].photo,done:false});
    }
  }
  tab='shopping';sv();R();
}

function chkOff(id){
  if(ckid)return;ckid=id;R();
  setTimeout(function(){
    for(var i=0;i<shop.length;i++){if(shop[i].id===id){shop[i].done=true;break;}}
    ckid=null;sv();R();
  },600);
}
function rstOne(id){for(var i=0;i<shop.length;i++){if(shop[i].id===id){shop[i].done=false;break;}}sv();R()}
function rstAll(){for(var i=0;i<shop.length;i++)shop[i].done=false;tab='shopping';sv();R()}

function pPh(){
  var el=document.getElementById('phIn');
  if(!el){
    el=document.createElement('input');el.type='file';el.accept='image/*';el.capture='environment';el.id='phIn';el.style.display='none';document.body.appendChild(el);
    el.onchange=function(){var f=this.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){photo=e.target.result;R()};r.readAsDataURL(f)};
  }
  el.click();
}

function showPhId(id,type,ev){
  if(ev){ev.stopPropagation();ev.preventDefault();}
  var arr=type==='t'?tmpl:shop;
  var src=null;
  for(var i=0;i<arr.length;i++){if(arr[i].id===id&&arr[i].photo){src=arr[i].photo;break;}}
  if(!src)return;
  var d=document.createElement('div');
  d.className='overlay';
  d.ontouchend=function(e){e.preventDefault();document.body.removeChild(d)};
  d.onclick=function(){document.body.removeChild(d)};
  var img=document.createElement('img');
  img.src=src;
  d.appendChild(img);
  document.body.appendChild(d);
}

// Event delegation for photo taps
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.tagName==='IMG'&&el.className==='th'){
    var id=parseInt(el.getAttribute('data-id'));
    var type=el.getAttribute('data-type');
    if(id&&type)showPhId(id,type,e);
  }
},true);

function tgV(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  var t=T[lang];
  if(!SR){showVM(lang==='ko'?'음성 입력 불가 (HTTPS 필요)':'Voice needs HTTPS');return}
  if(listening&&recog){
    try{recog.stop();}catch(ex){}
    listening=false;vmsg=null;R();
    return;
  }
  recog=new SR();
  recog.lang=lang==='ko'?'ko-KR':'en-US';
  recog.interimResults=true;
  recog.maxAlternatives=1;
  recog.continuous=true;
  recog.onresult=function(e){
    var last=e.results[e.results.length-1];
    var tx=last[0].transcript.trim();
    if(last.isFinal&&tx){
      var c=classify(tx);
      if(tab==='template'){
        tmpl.push({id:nid(),text:tx,category:c,qty:1,selected:true,photo:null});
      }else{
        shop.push({id:nid(),text:tx,category:c,qty:1,photo:null,done:false});
      }
      inp='';sv();R();
      var mi=document.getElementById('mi');if(mi)mi.value='';
      vmsg=lang==='ko'?'\u2714 '+tx+' \u2014 \uACC4\uC18D \uB9D0\uD558\uC138\uC694...':'\u2714 '+tx+' \u2014 keep talking...';
    }else if(tx){
      var mi=document.getElementById('mi');if(mi)mi.value=tx;
    }
  };
  recog.onerror=function(e){
    if(e.error==='no-speech'){
      showVM(lang==='ko'?'\uB2E4\uC2DC \uB9D0\uC500\uD574\uC8FC\uC138\uC694 / Say again':'Say again / \uB2E4\uC2DC \uB9D0\uC500\uD574\uC8FC\uC138\uC694');
    }else if(e.error==='not-allowed'){
      showVM(lang==='ko'?'\uB9C8\uC774\uD06C \uAD8C\uD55C \uD544\uC694 / Mic access needed':'Mic access needed / \uB9C8\uC774\uD06C \uAD8C\uD55C \uD544\uC694');
      listening=false;R();return;
    }else{
      showVM(lang==='ko'?'\uB2E4\uC2DC \uB9D0\uC500\uD574\uC8FC\uC138\uC694 / Say again':'Say again / \uB2E4\uC2DC \uB9D0\uC500\uD574\uC8FC\uC138\uC694');
    }
  };
  recog.onend=function(){
    if(listening){
      try{recog.start();}catch(ex){listening=false;vmsg=null;R();}
    }
  };
  try{
    recog.start();
    listening=true;
    vmsg=lang==='ko'?'\uB4E3\uACE0 \uC788\uC2B5\uB2C8\uB2E4... \uB9D0\uD558\uC138\uC694':'Listening... speak now';
    R();
  }catch(e){
    showVM(lang==='ko'?'\uC74C\uC131 \uC624\uB958 / Voice error':'Voice error / \uC74C\uC131 \uC624\uB958');
  }
}
function showVM(m){vmsg=m;R();clearTimeout(vtm);vtm=setTimeout(function(){vmsg=null;R()},3500)}

R();

</script>
