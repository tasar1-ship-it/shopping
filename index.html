function classify(text){
  var lower=text.toLowerCase();
  for(var i=0;i<KR.length;i++){
    var kws=KR[i][1];
    for(var j=0;j<kws.length;j++){
      var kw=kws[j];
      var escaped=kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      try{if(new RegExp('\\b'+escaped+'\\b','i').test(lower))return KR[i][0];}
      catch(e){if(lower.indexOf(kw)>=0)return KR[i][0];}
    }
  }
  return"Other";
}

// ─── SAVE: localStorage + Firebase ───
function sv(){
  // Strip photos for cloud save (too large)
  var tClean=tmpl.map(function(x){var c={};for(var k in x)c[k]=x[k];c.photo=null;return c});
  var sClean=shop.map(function(x){var c={};for(var k in x)c[k]=x[k];c.photo=null;return c});
  // Local (with photos)
  try{
    localStorage.setItem('sl3_t',JSON.stringify(tmpl));
    localStorage.setItem('sl3_s',JSON.stringify(shop));
    localStorage.setItem('sl3_l',lang);
  }catch(e){
    try{
      localStorage.setItem('sl3_t',JSON.stringify(tClean));
      localStorage.setItem('sl3_s',JSON.stringify(sClean));
    }catch(e2){}
  }
  // Firebase (without photos)
  try{
    db.ref('devices/'+devId+'/template').set(tClean);
    db.ref('devices/'+devId+'/shopping').set(sClean);
    db.ref('devices/'+devId+'/lang').set(lang);
  }catch(e){}
}

// ─── LOAD: localStorage first, then Firebase overwrites ───
function ld(){
  // Migrate from old version (sl2_ keys) if no sl3_ data exists
  try{
    var hasNew=localStorage.getItem('sl3_t');
    if(!hasNew){
      var oldT=JSON.parse(localStorage.getItem('sl2_t'));
      var oldS=JSON.parse(localStorage.getItem('sl2_s'));
      var oldL=localStorage.getItem('sl2_l');
      if(oldT){localStorage.setItem('sl3_t',JSON.stringify(oldT));}
      if(oldS){localStorage.setItem('sl3_s',JSON.stringify(oldS));}
      if(oldL){localStorage.setItem('sl3_l',oldL);}
    }
  }catch(e){}
  // Local first (fast, has photos)
  try{
    var a=JSON.parse(localStorage.getItem('sl3_t'));if(a)tmpl=a;
    var b=JSON.parse(localStorage.getItem('sl3_s'));if(b)shop=b;
    var c=localStorage.getItem('sl3_l');if(c)lang=c;
  }catch(e){}
  fixUid();
  // Then load from Firebase (authoritative, no photos)
  db.ref('devices/'+devId).once('value',function(snap){
    var d=snap.val();
    if(d){
      if(d.template){
        // Merge: use Firebase data but preserve local photos
        var photoMap={};
        for(var i=0;i<tmpl.length;i++){if(tmpl[i].photo)photoMap[tmpl[i].text]=tmpl[i].photo;}
        tmpl=d.template;
        for(var i=0;i<tmpl.length;i++){if(!tmpl[i].photo&&photoMap[tmpl[i].text])tmpl[i].photo=photoMap[tmpl[i].text];}
      }
      if(d.shopping){
        var photoMap2={};
        for(var i=0;i<shop.length;i++){if(shop[i].photo)photoMap2[shop[i].text]=shop[i].photo;}
        shop=d.shopping;
        for(var i=0;i<shop.length;i++){if(!shop[i].photo&&photoMap2[shop[i].text])shop[i].photo=photoMap2[shop[i].text];}
      }
      if(d.lang)lang=d.lang;
      fixUid();
      fbOK=true;
      R();
    }else{
      fbOK=true;
      sv(); // First time: push local data to Firebase
      R();
    }
  },function(err){
    fbOK=false;
    R();
  });
}

function fixUid(){
  var mx=0;
  for(var i=0;i<tmpl.length;i++){if(tmpl[i].id>mx)mx=tmpl[i].id;}
  for(var i=0;i<shop.length;i++){if(shop[i].id>mx)mx=shop[i].id;}
  uid=mx;
}

// ─── INBOX: listen for items sent from another device ───
function listenInbox(){
  db.ref('inbox/'+devId).on('value',function(snap){
    var d=snap.val();
    if(!d)return;
    var items=d.items;
    if(!items||!items.length)return;
    var count=0;
    for(var i=0;i<items.length;i++){
      var it=items[i];
      if(it.text){
        shop.push({id:nid(),text:it.text,category:it.category||classify(it.text),qty:it.qty||1,photo:null,done:false});
        count++;
      }
    }
    // Clear inbox
    db.ref('inbox/'+devId).remove();
    if(count>0){
      tab='shopping';
      sv();R();
      showToast((lang==='ko'?count+'\uAC1C \uD56D\uBAA9 \uC218\uC2E0!':count+' items received!'));
    }
  });
}

function saveTarget(){
  var i=document.getElementById('targetInput');

  var t=i.value.trim().toUpperCase();

  R();

function sendToR(){
  var target=getSendTarget();
  if(!target){setupSend();return;}
  var act=[];
  for(var i=0;i<shop.length;i++){
    if(!shop[i].done)act.push({text:shop[i].text,category:shop[i].category,qty:shop[i].qty});
  }
  if(act.length===0)return;
  db.ref('inbox/'+target).set({items:act,from:devId,time:Date.now()},function(err){
    if(err){showToast(lang==='ko'?'\uC804\uC1A1 \uC2E4\uD328':'Send failed');}
    else{showToast(lang==='ko'?act.length+'\uAC1C \uC804\uC1A1\uB428!':act.length+' items sent!');}
  });
}

// ─── ACTIONS ───
function tgLang(){lang=lang==='en'?'ko':'en';sv();R()}
function sTab(t){tab=t;R()}

function addT(){
  var mi=document.getElementById('mi');if(mi)inp=mi.value;
  var txt=inp.trim();if(!txt)return;
  tmpl.push({id:nid(),text:txt,category:classify(txt),qty:1,selected:true,photo:photo});
  inp='';photo=null;var ph=document.getElementById('phIn');if(ph)ph.value='';sv();R();
}
function addS(){
  var mi=document.getElementById('mi');if(mi)inp=mi.value;
  var txt=inp.trim();if(!txt)return;
  shop.push({id:nid(),text:txt,category:classify(txt),qty:1,photo:photo,done:false});
  inp='';photo=null;var ph=document.getElementById('phIn');if(ph)ph.value='';sv();R();
}
function tgSel(id){for(var i=0;i<tmpl.length;i++){if(tmpl[i].id===id){tmpl[i].selected=!tmpl[i].selected;break;}}sv();R()}
function sQty(id,d){for(var i=0;i<tmpl.length;i++){if(tmpl[i].id===id){tmpl[i].qty=Math.max(1,tmpl[i].qty+d);break;}}sv();R()}
function delT(id){tmpl=tmpl.filter(function(x){return x.id!==id});sv();R()}
function selA(){for(var i=0;i<tmpl.length;i++)tmpl[i].selected=true;sv();R()}
function deA(){for(var i=0;i<tmpl.length;i++)tmpl[i].selected=false;sv();R()}

function goShop(){
  var keep=[];
  for(var i=0;i<shop.length;i++){if(!shop[i].done)keep.push(shop[i]);}
  var existing={};
  for(var i=0;i<keep.length;i++){existing[keep[i].text.toLowerCase()]=true;}
  for(var i=0;i<tmpl.length;i++){
    if(tmpl[i].selected&&!existing[tmpl[i].text.toLowerCase()]){
      keep.push({id:nid(),text:tmpl[i].text,category:tmpl[i].category,qty:tmpl[i].qty,photo:tmpl[i].photo,done:false});
    }
  }
  shop=keep;tab='shopping';sv();R();
}

function chkOff(id){
  if(ckid)return;ckid=id;R();
  setTimeout(function(){
    for(var i=0;i<shop.length;i++){if(shop[i].id===id){shop[i].done=true;break;}}
    ckid=null;sv();R();
  },600);
}
function delShop(id){shop=shop.filter(function(x){return x.id!==id});sv();R()}
function rstAll(){for(var i=0;i<shop.length;i++)shop[i].done=false;tab='shopping';sv();R()}

  if(!el){
    el=document.createElement('input');el.type='file';el.accept='image/*';el.capture='environment';el.id='phIn';el.style.display='none';document.body.appendChild(el);
    el.onchange=function(){
      var f=this.files[0];if(!f)return;
      var r=new FileReader();
      r.onload=function(e){compressPhoto(e.target.result,function(c){photo=c;R()})};
      r.readAsDataURL(f);
    };
  }
  el.click();
}
function compressPhoto(dataURL,cb){
  var img=new Image();
  img.onload=function(){
    var mx=400,w=img.width,h=img.height;
    if(w>mx||h>mx){if(w>h){h=Math.round(h*mx/w);w=mx;}else{w=Math.round(w*mx/h);h=mx;}}
    var c=document.createElement('canvas');c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    cb(c.toDataURL('image/jpeg',0.6));
  };
  img.onerror=function(){cb(dataURL)};
  img.src=dataURL;
}

function showPhId(id,type,ev){
  if(ev){ev.stopPropagation();ev.preventDefault();}
  var arr=type==='t'?tmpl:shop;var src=null;

  if(!src)return;
  var d=document.createElement('div');d.className='overlay';
  d.ontouchend=function(e){e.preventDefault();document.body.removeChild(d)};
  d.onclick=function(){document.body.removeChild(d)};
  var im=document.createElement('img');im.src=src;d.appendChild(im);document.body.appendChild(d);
}
document.addEventListener('click',function(e){

// ─── VOICE ───
function tgV(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showVM(lang==='ko'?'\uC74C\uC131 \uC785\uB825 \uBD88\uAC00 (HTTPS \uD544\uC694)':'Voice needs HTTPS');return}
  if(listening&&recog){try{recog.stop();}catch(ex){}listening=false;vmsg=null;R();return}
  recog=new SR();
  recog.lang=lang==='ko'?'ko-KR':'en-US';
  recog.interimResults=true;recog.maxAlternatives=1;recog.continuous=true;
  recog.onresult=function(e){
    var last=e.results[e.results.length-1];
    var tx=last[0].transcript.trim();
    if(last.isFinal&&tx){
      var c=classify(tx);
      if(tab==='template'){tmpl.push({id:nid(),text:tx,category:c,qty:1,selected:true,photo:null});}
      else{shop.push({id:nid(),text:tx,category:c,qty:1,photo:null,done:false});}
      inp='';sv();R();
      vmsg='\u2714 '+tx;
    }else if(tx){var mi=document.getElementById('mi');if(mi)mi.value=tx;}
  };
  recog.onerror=function(e){
    if(e.error==='no-speech'){showVM('Say again / \uB2E4\uC2DC \uB9D0\uC500\uD574\uC8FC\uC138\uC694');}
    else if(e.error==='not-allowed'){showVM(lang==='ko'?'\uB9C8\uC774\uD06C \uAD8C\uD55C \uD544\uC694':'Mic access needed');listening=false;R();return;}
    else{showVM('Say again / \uB2E4\uC2DC \uB9D0\uC500\uD574\uC8FC\uC138\uC694');}
  };
  recog.onend=function(){if(listening){try{recog.start();}catch(ex){listening=false;vmsg=null;R();}}};
  try{recog.start();listening=true;vmsg=lang==='ko'?'\uB4E3\uACE0 \uC788\uC2B5\uB2C8\uB2E4...':'Listening...';R();}
  catch(e){showVM(lang==='ko'?'\uC74C\uC131 \uC624\uB958':'Voice error');}
}
function showVM(m){vmsg=m;R();clearTimeout(vtm);vtm=setTimeout(function(){vmsg=null;R()},3500)}

}
