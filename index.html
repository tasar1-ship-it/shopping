<style>
:root{--t:#0ABAB5;--td:#088F8B;--tl:#123F3D;--bg:#142E2D;--card:#1B3937;--text:#E0F5F4;--muted:#4A7573;--dim:#3D6563}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden}
body{max-width:480px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom)}
input::placeholder{color:var(--muted)}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes checkOff{0%{opacity:1;transform:scale(1)}50%{opacity:1;transform:scale(1.02)}100%{opacity:.3;transform:scale(.97)}}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(10,186,181,.5)}70%{box-shadow:0 0 0 10px rgba(10,186,181,0)}100%{box-shadow:0 0 0 0 rgba(10,186,181,0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.header{background:linear-gradient(165deg,var(--t) 0%,var(--td) 100%);padding:48px 20px 0;border-radius:0 0 24px 24px;box-shadow:0 8px 32px rgba(10,186,181,.25)}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.title{font-family:'Cormorant Garamond',Georgia,serif;font-size:28px;font-weight:500;color:#fff;letter-spacing:.02em;line-height:1.1}
.subtitle{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px;letter-spacing:.04em}
.lang-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.tabs{display:flex;margin-top:4px}
.tab{flex:1;background:none;border:none;color:rgba(255,255,255,.45);padding:10px 0;font-size:12px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;display:flex;align-items:center;justify-content:center;gap:5px;font-family:'DM Sans',sans-serif}
.tab.active{color:#fff;border-bottom-color:#fff}
.badge{background:#fff;color:var(--td);font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px}
.badge-m{background:rgba(255,255,255,.2);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px}

.input-area{padding:14px 16px 4px}
.input-row{display:flex;gap:5px;align-items:center}
.input-row input[type="text"]{flex:1;padding:11px 13px;border-radius:12px;border:1.5px solid var(--tl);font-size:14px;outline:none;background:var(--card);color:var(--text);font-family:'DM Sans',sans-serif}
.icon-btn{width:38px;height:38px;border-radius:11px;border:1.5px solid var(--tl);background:var(--card);color:var(--t);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.icon-btn.mic-active{background:var(--t);color:#fff;border-color:var(--t);animation:pulse 1.2s ease infinite}
.add-btn{padding:11px 14px;border-radius:12px;border:none;background:var(--t);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0}
.voice-toast{margin-top:6px;padding:7px 12px;border-radius:9px;background:var(--tl);color:var(--t);font-size:11px;font-weight:500;display:flex;align-items:center;gap:7px}
.voice-dot{width:7px;height:7px;border-radius:50%;background:#ff4444;animation:blink 1s ease infinite}
.photo-preview{margin-top:6px;display:flex;align-items:center;gap:6px}
.photo-preview img{width:44px;height:44px;border-radius:9px;object-fit:cover;border:2px solid var(--tl)}
.photo-preview button{background:rgba(255,255,255,.08);border:none;border-radius:7px;width:24px;height:24px;font-size:12px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center}

.list-area{padding:4px 16px 32px}
.template-actions{display:flex;gap:6px;align-items:center;padding:8px 0 4px;flex-wrap:wrap}
.sm-btn{background:var(--tl);border:none;color:var(--t);padding:5px 10px;border-radius:9px;font-size:10px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.start-btn{background:var(--t);border:none;color:#fff;padding:7px 14px;border-radius:11px;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;margin-left:auto}

.cat-group{margin-top:14px}
.cat-header{display:flex;align-items:center;gap:7px;margin-bottom:5px;padding-left:3px}
.cat-dot{width:7px;height:7px;border-radius:50%;background:var(--t);flex-shrink:0}
.cat-name{font-size:10px;font-weight:600;color:var(--t);letter-spacing:.05em;text-transform:uppercase;flex:1}
.cat-count{font-size:10px;color:var(--dim);font-weight:500}

.item{display:flex;align-items:center;gap:9px;padding:10px 11px;background:var(--card);border-radius:12px;margin-bottom:4px;animation:fadeIn .3s ease forwards;opacity:0}
.item.clickable{cursor:pointer}
.item.checking{animation:checkOff .6s ease forwards!important}

.check-circle{width:20px;height:20px;border-radius:50%;border:2px solid #2A5553;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.check-circle.on{background:var(--t);border-color:var(--t)}
.select-box{width:20px;height:20px;border-radius:5px;border:2px solid #2A5553;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;background:transparent}
.select-box.on{background:var(--t);border-color:var(--t)}

.item-text{flex:1;font-size:13px;color:#D4EEEC;line-height:1.3}
.item-text.off{color:var(--dim);text-decoration:line-through}
.item-text.done{color:var(--dim);text-decoration:line-through}

.qty-ctrl{display:flex;align-items:center;gap:1px;flex-shrink:0}
.qty-btn{width:24px;height:24px;border-radius:7px;border:none;background:var(--tl);color:var(--t);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qty-num{width:22px;text-align:center;font-size:13px;font-weight:600;color:var(--text)}
.qty-badge{background:var(--tl);color:var(--t);font-size:11px;font-weight:700;padding:2px 7px;border-radius:7px;flex-shrink:0}

.del-btn{width:26px;height:26px;border-radius:7px;border:none;background:transparent;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.thumb{width:34px;height:34px;border-radius:7px;object-fit:cover;border:1.5px solid var(--tl);flex-shrink:0}

.restore-bar{padding:6px 0 4px}
.restore-btn{display:flex;align-items:center;justify-content:center;width:100%;padding:9px 0;border-radius:11px;border:1.5px solid var(--t);background:var(--tl);color:var(--t);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;gap:5px}
.completed-item{opacity:.55}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 0;color:var(--muted);font-size:13px;text-align:center}
.empty .sub{color:var(--dim);font-size:11px;margin-top:3px}
.empty svg{margin-bottom:10px;opacity:.4}
</style>

function categorize(text){
  const lower=text.toLowerCase();
  for(const [cat,kwStr] of RULES){
    // Extract keywords: split by known multi-word phrases first
    // Simple approach: try to match each keyword phrase
    const keywords=kwStr.split(/ (?=[a-zA-Z\u3131-\uD79D])/);

    for(const kw of kwStr.split(/ {2,}| /).filter(Boolean)){
      // Skip single chars
      if(kw.length<2) continue;
      try{
        const escaped=kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');

function cat(text){
  const lower=text.toLowerCase();
  for(const[c,kws]of KEYWORD_RULES){
    for(const kw of kws){
      try{
        const e=kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
        if(new RegExp('\\b'+e+'\\b','i').test(lower))return c;
      }catch(ex){if(lower.includes(kw))return c;}
    }
  }
  return"Other";
}

// ─── STATE ───
let uid=0;
const nid=()=>++uid;
let lang='en', tab='template', templateItems=[], shopItems=[], inputVal='', pendingPhoto=null;
let listening=false, voiceMsg=null, voiceTm=null, checkingId=null, recognition=null;

function save(){localStorage.setItem('sl_tmpl',JSON.stringify(templateItems));localStorage.setItem('sl_shop',JSON.stringify(shopItems));localStorage.setItem('sl_lang',lang)}
function load(){
  try{
    const t=JSON.parse(localStorage.getItem('sl_tmpl'));if(t)templateItems=t;
    const s=JSON.parse(localStorage.getItem('sl_shop'));if(s)shopItems=s;
    const l=localStorage.getItem('sl_lang');if(l)lang=l;
    uid=Math.max(...[...templateItems,...shopItems].map(i=>i.id||0),0);
  }catch(e){}
}
load();

function group(items){
  const g={};
  items.forEach(i=>{if(!g[i.category])g[i.category]=[];g[i.category].push(i)});
  return Object.keys(g).sort((a,b)=>a==='Other'?1:b==='Other'?-1:a.localeCompare(b)).map(c=>({c,items:g[c]}));
}

// ─── RENDER ───
function render(){
  const t=LANG[lang];
  const active=shopItems.filter(i=>!i.done);
  const done=shopItems.filter(i=>i.done);
  const selCt=templateItems.filter(i=>i.selected).length;

  let h=`<div class="header"><div class="header-top"><div><div class="title">${t.title}</div><div class="subtitle">${t.subtitle}</div></div><button class="lang-btn" onclick="toggleLang()">${lang==='en'?'한국어':'English'}</button></div><div class="tabs">`;
  ['template','shopping','completed'].forEach(k=>{
    const label=k==='template'?t.template:k==='shopping'?t.shopping:t.completed;
    const ct=k==='template'?templateItems.length:k==='shopping'?active.length:done.length;
    const bc=k==='completed'?'badge-m':'badge';
    h+=`<button class="tab${tab===k?' active':''}" onclick="setTab('${k}')">${label}${ct>0?` <span class="${bc}">${ct}</span>`:''}</button>`;
  });
  h+=`</div></div>`;

  // Input
  if(tab==='template'||tab==='shopping'){
    const action=tab==='template'?'addTemplate':'addShop';
    h+=`<div class="input-area"><div class="input-row">
      <input type="text" id="mainInput" value="${esc(inputVal)}" placeholder="${t.ph}" oninput="inputVal=this.value" onkeydown="if(event.key==='Enter')${action}()">
      <button class="icon-btn" onclick="pickPhoto()" title="Photo"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></button>
      <button class="icon-btn${listening?' mic-active':''}" onclick="toggleVoice()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button>
      <button class="add-btn" onclick="${action}()">${t.add}</button>
    </div>`;
    if(voiceMsg) h+=`<div class="voice-toast">${listening?'<span class="voice-dot"></span>':''}${voiceMsg}</div>`;
    if(pendingPhoto) h+=`<div class="photo-preview"><img src="${pendingPhoto}"><button onclick="pendingPhoto=null;render()">✕</button></div>`;
    h+=`</div>`;
  }

  h+=`<div class="list-area">`;

  // TEMPLATE
  if(tab==='template'){
    if(templateItems.length>0){
      h+=`<div class="template-actions"><button class="sm-btn" onclick="selAll()">${t.selAll}</button><button class="sm-btn" onclick="deAll()">${t.deAll}</button><button class="start-btn" onclick="startShopping()">${t.start} (${selCt})</button></div>`;
    }else{
      h+=`<div class="empty"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#0ABAB5" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg><div>${t.emptyT}</div><div class="sub">${t.emptyTS}</div></div>`;
    }
    group(templateItems).forEach(({c,items})=>{
      h+=`<div class="cat-group"><div class="cat-header"><span class="cat-dot"></span><span class="cat-name">${t.cats[c]||c}</span><span class="cat-count">${items.length}</span></div>`;
      items.forEach((it,i)=>{
        h+=`<div class="item" style="animation-delay:${i*30}ms"><button class="select-box${it.selected?' on':''}" onclick="toggleSel(${it.id})"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="display:${it.selected?'block':'none'}"><polyline points="20 6 9 17 4 12"/></svg></button><span class="item-text${it.selected?'':' off'}">${esc(it.text)}</span>${it.photo?`<img class="thumb" src="${it.photo}">`:''}
        <div class="qty-ctrl"><button class="qty-btn" onclick="setQty(${it.id},-1)">−</button><span class="qty-num">${it.qty}</span><button class="qty-btn" onclick="setQty(${it.id},1)">+</button></div>
        <button class="del-btn" onclick="delTemplate(${it.id})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>`;
      });
      h+=`</div>`;
    });
  }

  // SHOPPING
  if(tab==='shopping'){
    if(active.length===0){
      h+=`<div class="empty"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#0ABAB5" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><div>${t.empty}</div></div>`;
    }
    group(active).forEach(({c,items})=>{
      h+=`<div class="cat-group"><div class="cat-header"><span class="cat-dot"></span><span class="cat-name">${t.cats[c]||c}</span><span class="cat-count">${items.length}</span></div>`;
      items.forEach((it,i)=>{
        const ck=it.id===checkingId;
        h+=`<div class="item clickable${ck?' checking':''}" style="animation-delay:${i*30}ms" onclick="checkOff(${it.id})"><div class="check-circle${ck?' on':''}"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="display:${ck?'block':'none'}"><polyline points="20 6 9 17 4 12"/></svg></div><span class="item-text${ck?' done':''}">${esc(it.text)}</span>${it.qty>1?`<span class="qty-badge">×${it.qty}</span>`:''}${it.photo?`<img class="thumb" src="${it.photo}">`:''}
        </div>`;
      });
      h+=`</div>`;
    });
  }

  // COMPLETED
  if(tab==='completed'){
    if(done.length>0){
      h+=`<div class="restore-bar"><button class="restore-btn" onclick="restoreAll()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>${t.reset}</button></div>`;
    }else{
      h+=`<div class="empty"><div>${t.emptyC}</div></div>`;
    }
    group(done).forEach(({c,items})=>{
      h+=`<div class="cat-group"><div class="cat-header"><span class="cat-dot"></span><span class="cat-name">${t.cats[c]||c}</span></div>`;
      items.forEach(it=>{
        h+=`<div class="item clickable completed-item" onclick="restoreOne(${it.id})"><div class="check-circle on"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div><span class="item-text done">${esc(it.text)}</span>${it.qty>1?`<span class="qty-badge" style="opacity:.5">×${it.qty}</span>`:''}</div>`;
      });
      h+=`</div>`;
    });
  }

  h+=`</div>`;
  document.getElementById('app').innerHTML=h;
  // Restore input focus
  const inp=document.getElementById('mainInput');
  if(inp){inp.value=inputVal;}
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ─── ACTIONS ───
function toggleLang(){lang=lang==='en'?'ko':'en';save();render()}
function setTab(t){tab=t;render()}

function addTemplate(){
  const txt=inputVal.trim();if(!txt)return;
  templateItems.push({id:nid(),text:txt,category:cat(txt),qty:1,selected:true,photo:pendingPhoto});
  inputVal='';pendingPhoto=null;save();render();
}
function addShop(){
  const txt=inputVal.trim();if(!txt)return;
  shopItems.push({id:nid(),text:txt,category:cat(txt),qty:1,photo:pendingPhoto,done:false});
  inputVal='';pendingPhoto=null;save();render();
}
function toggleSel(id){const it=templateItems.find(i=>i.id===id);if(it)it.selected=!it.selected;save();render()}
function setQty(id,d){const it=templateItems.find(i=>i.id===id);if(it)it.qty=Math.max(1,it.qty+d);save();render()}
function delTemplate(id){templateItems=templateItems.filter(i=>i.id!==id);save();render()}
function selAll(){templateItems.forEach(i=>i.selected=true);save();render()}
function deAll(){templateItems.forEach(i=>i.selected=false);save();render()}

function startShopping(){
  const sel=templateItems.filter(i=>i.selected);
  shopItems=sel.map(i=>({id:nid(),text:i.text,category:i.category,qty:i.qty,photo:i.photo,done:false}));
  tab='shopping';save();render();
}

function checkOff(id){
  if(checkingId)return;
  checkingId=id;render();
  setTimeout(()=>{
    const it=shopItems.find(i=>i.id===id);if(it)it.done=true;
    checkingId=null;save();render();
  },600);
}
function restoreOne(id){const it=shopItems.find(i=>i.id===id);if(it)it.done=false;save();render()}
function restoreAll(){shopItems.forEach(i=>i.done=false);tab='shopping';save();render()}

function pickPhoto(){
  let inp=document.getElementById('photoInput');
  if(!inp){inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.capture='environment';inp.id='photoInput';inp.style.display='none';document.body.appendChild(inp);
    inp.onchange=function(){const f=this.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{pendingPhoto=e.target.result;render()};r.readAsDataURL(f)};
  }
  inp.click();
}

function toggleVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const t=LANG[lang];
  if(!SR){showVoiceMsg(t.voiceNA);return}
  if(listening&&recognition){recognition.stop();listening=false;voiceMsg=null;render();return}
  recognition=new SR();
  recognition.lang=lang==='ko'?'ko-KR':'en-US';
  recognition.interimResults=true;recognition.maxAlternatives=1;recognition.continuous=false;
  recognition.onresult=e=>{
    const result=e.results[e.results.length-1];
    const tx=result[0].transcript.trim();
    if(result.isFinal){
      inputVal=tx;listening=false;voiceMsg=null;recognition.stop();
      if(tab==='template')addTemplate();else addShop();
      render();
    }else{
      // Show live preview while speaking
      const inp=document.getElementById('mainInput');
      if(inp)inp.value=tx;
    }
  };
  recognition.onerror=e=>{listening=false;showVoiceMsg(e.error==='not-allowed'?t.micDenied:t.voiceErr);render()};
  recognition.onend=()=>{listening=false;render()};
  try{recognition.start();listening=true;voiceMsg=t.listening;render()}
  catch(e){showVoiceMsg(t.voiceErr)}
}
function showVoiceMsg(msg){voiceMsg=msg;render();clearTimeout(voiceTm);voiceTm=setTimeout(()=>{voiceMsg=null;render()},3500)}

// Initial render
render();
</script>
</body>
</html>
